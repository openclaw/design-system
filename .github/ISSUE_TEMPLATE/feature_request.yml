name: Feature request
description: Propose a shared design-system capability or contract change.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete problem cannot be solved with the current design contract?
    validations:
      required: true
  - type: textarea
    id: consumers
    attributes:
      label: Shared consumer evidence
      description: Name the consumers that share the same interface, behavior, or visual intent.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed contract
      description: Describe the desired token, theme, stylesheet, package, or skill behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain existing local solutions and why they are insufficient.
  - type: checkboxes
    id: surfaces
    attributes:
      label: Affected surfaces
      options:
        - label: Tokens or themes
        - label: Shared styles or component primitives
        - label: Tailwind or consumer adapter
        - label: Package exports or release archive
        - label: Agent skill or audit guidance
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note migration, release, consumer, accessibility, or breaking-change concerns.
    validations:
      required: true
